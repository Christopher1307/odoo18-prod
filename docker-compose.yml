services:
  web:
    build: .
    depends_on:
      - db
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    ports:
      - "8069:8069"
    volumes:
      - .:/opt/odoo/workspace
      - ./config:/etc/odoo
      - odoo-web-data:/var/lib/odoo
    command:
      - odoo
      - -c
      - /etc/odoo/odoo.conf
      - --db_host=db
      - --db_user=odoo
      - --db_password=odoo
      - --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/opt/odoo/workspace/extra-addons/server-tools,/opt/odoo/workspace/extra-addons/web-18.0
  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

volumes:
  odoo-web-data:
  odoo-db-data:
